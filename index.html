<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vista Recurring Task Builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, Segoe UI, sans-serif; background: #f4f6fb; color: #1a1a2e; padding: 24px 16px; }
    .container { max-width: 680px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .logo { background: #1C4F8C; border-radius: 10px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo span { color: #fff; font-weight: 800; font-size: 14px; }
    .header-title { font-weight: 700; font-size: 18px; }
    .header-sub { font-size: 12px; color: #666; }
    .open-sheet { margin-left: auto; font-size: 12px; color: #003087; font-weight: 600; text-decoration: none; background: #e8f0fe; padding: 5px 12px; border-radius: 20px; white-space: nowrap; }
    .open-sheet:hover { background: #d0e2ff; }
    .sheet-label { font-size: 12px; color: #888; margin-bottom: 20px; padding-left: 52px; }
    .sheet-label strong { color: #333; }

    /* Cards */
    .card { background: #fff; border: 1px solid #e0e4f5; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
    .card-title { font-weight: 600; margin-bottom: 12px; font-size: 13px; color: #444; }

    /* Form grid */
    .grid-3 { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .grid-2 { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
    label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid #d0d5e8; border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; }
    input:focus, select:focus { outline: none; border-color: #1C4F8C; }

    /* Buttons */
    .btn-preview { padding: 9px 20px; background: #1C4F8C; color: #fff; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; }
    .btn-preview:disabled { background: #ccc; cursor: default; }
    .btn-push { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 10px; border: none; background: #1C4F8C; color: #fff; cursor: pointer; }
    .btn-push:disabled { background: #ccc; cursor: default; }
    .btn-clear { font-size: 12px; color: #999; background: none; border: none; cursor: pointer; }

    /* Preview table */
    .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .table-wrap { max-height: 300px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #f4f6ff; }
    th { padding: 7px 10px; text-align: left; color: #555; font-weight: 600; font-size: 12px; }
    td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; }
    .badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-monthly   { background: #e8f0fe; color: #1a73e8; }
    .badge-quarterly { background: #f3e8ff; color: #7c3aed; }
    .btn-remove { color: #f87171; background: none; border: none; cursor: pointer; font-size: 16px; }

    /* Status */
    .status { margin-top: 16px; padding: 16px; border-radius: 10px; }
    .status.ok  { background: #f0fdf4; border: 1px solid #86efac; }
    .status.err { background: #fff1f2; border: 1px solid #fca5a5; }
    .status-msg { font-weight: 600; margin-bottom: 8px; }
    .status a { color: #003087; font-size: 13px; font-weight: 600; }

    @media (max-width: 520px) {
      .grid-3 { grid-template-columns: 1fr 1fr; }
      .grid-3 > :first-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo"><span>V</span></div>
    <div>
      <div class="header-title">Recurring Task Builder</div>
      <div class="header-sub">Vista × Smartsheet</div>
    </div>
    <a class="open-sheet" href="https://app.smartsheet.com/sheets/8wFMx42Qw5jJM2WxvPMqv6Jjvj9743jM7VGh5p41" target="_blank" rel="noopener">📄 Open Sheet ↗</a>
  </div>
  <div class="sheet-label">Adding to: <strong>Payroll Master Calendar</strong></div>

  <!-- Task Entry -->
  <div class="card">
    <div class="card-title">➕ ADD A TASK</div>
    <div class="grid-3">
      <div>
        <label for="taskName">Task Name</label>
        <input id="taskName" placeholder="e.g. Fraud Risk Review" />
      </div>
      <div>
        <label for="startDate">Start Date</label>
        <input id="startDate" type="date" />
      </div>
      <div>
        <label for="recurrence">Recurrence</label>
        <select id="recurrence">
          <option>Monthly</option>
          <option>Quarterly</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div>
        <label for="assignedTo">Assigned To</label>
        <select id="assignedTo">
          <option value="reksha.rathnam@demo.mbfcorp.com">Reksha Rathnam</option>
          <option value="brooklyn@demo.mbfcorp.com">Brooklyn Jansen</option>
        </select>
      </div>
      <button class="btn-preview" id="btnPreview" onclick="handlePreview()">+ Preview</button>
    </div>
  </div>

  <!-- Preview Table (hidden until rows exist) -->
  <div class="card" id="previewCard" style="display:none;">
    <div class="preview-header">
      <div class="card-title" id="previewTitle">👁 PREVIEW — 0 ROWS TO ADD</div>
      <button class="btn-clear" onclick="clearAll()">Clear all</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Task</th><th>Due Date</th><th>Assigned To</th><th>Recurrence</th><th></th></tr>
        </thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Push Button -->
  <button class="btn-push" id="btnPush" onclick="handlePush()" disabled>
    🚀 Push 0 Rows to Smartsheet
  </button>

  <!-- Status -->
  <div id="statusBox" style="display:none;"></div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const SHEET_ID = 1292277373685636;
  const SHEET_URL = "https://app.smartsheet.com/sheets/8wFMx42Qw5jJM2WxvPMqv6Jjvj9743jM7VGh5p41";
  const COL = {
    task:       3893563890110340,
    dueDate:    8397163517480836,
    assignedTo: 1078814123003780,
    reoccur:    5582413750374276,
  };
  const CONTACTS = {
    "reksha.rathnam@demo.mbfcorp.com": "Reksha Rathnam",
    "brooklyn@demo.mbfcorp.com": "Brooklyn Jansen",
  };

  let rows = [];

  // ── Date helpers ─────────────────────────────────────────────────────────────
  function generateDates(startISO, recurrence) {
    const dates = [];
    const start = new Date(startISO + "T12:00:00");
    const year = start.getFullYear();
    const interval = recurrence === "Monthly" ? 1 : 3;
    let cur = new Date(start);
    dates.push(fmt(cur));
    while (true) {
      const next = new Date(cur);
      next.setMonth(next.getMonth() + interval);
      if (next.getFullYear() > year) break;
      dates.push(fmt(next));
      cur = next;
    }
    return dates;
  }

  function fmt(d) { return d.toISOString().split("T")[0]; }

  function fmtDisplay(iso) {
    const [y, m, day] = iso.split("-");
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return months[parseInt(m)-1] + " " + parseInt(day) + ", " + y;
  }

  // ── Preview ──────────────────────────────────────────────────────────────────
  function handlePreview() {
    const taskName  = document.getElementById("taskName").value.trim();
    const startDate = document.getElementById("startDate").value;
    const recurrence = document.getElementById("recurrence").value;
    const assignedTo = document.getElementById("assignedTo").value;
    if (!taskName || !startDate) return;

    const dates = generateDates(startDate, recurrence);
    dates.forEach(d => rows.push({ task: taskName, date: d, recurrence, assignedTo }));

    document.getElementById("taskName").value = "";
    document.getElementById("startDate").value = "";
    renderPreview();
  }

  function removeRow(i) {
    rows.splice(i, 1);
    renderPreview();
  }

  function clearAll() {
    rows = [];
    renderPreview();
  }

  function renderPreview() {
    const card  = document.getElementById("previewCard");
    const tbody = document.getElementById("previewBody");
    const title = document.getElementById("previewTitle");
    const btnPush = document.getElementById("btnPush");

    if (rows.length === 0) {
      card.style.display = "none";
      btnPush.disabled = true;
      btnPush.textContent = "🚀 Push 0 Rows to Smartsheet";
      return;
    }

    card.style.display = "block";
    title.textContent = "👁 PREVIEW — " + rows.length + " ROWS TO ADD";
    btnPush.disabled = false;
    btnPush.textContent = "🚀 Push " + rows.length + " Row" + (rows.length !== 1 ? "s" : "") + " to Smartsheet";

    tbody.innerHTML = rows.map((r, i) => `
      <tr>
        <td style="font-weight:500">${r.task}</td>
        <td>${fmtDisplay(r.date)}</td>
        <td style="color:#555">${CONTACTS[r.assignedTo] || r.assignedTo}</td>
        <td><span class="badge badge-${r.recurrence.toLowerCase()}">${r.recurrence}</span></td>
        <td><button class="btn-remove" onclick="removeRow(${i})">×</button></td>
      </tr>
    `).join("");
  }

  // ── Push to Smartsheet ───────────────────────────────────────────────────────
  async function handlePush() {
    if (rows.length === 0) return;
    const btnPush = document.getElementById("btnPush");
    btnPush.disabled = true;
    btnPush.textContent = "⏳ Adding rows...";
    showStatus(null);

    try {
      const payload = rows.map(r => ({
        cells: [
          { columnId: COL.task,       value: r.task },
          { columnId: COL.dueDate,    value: r.date },
          { columnId: COL.assignedTo, value: r.assignedTo },
          { columnId: COL.reoccur,    value: r.recurrence },
        ]
      }));

      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: "Use add_rows to add rows to the Smartsheet. Return ONLY a JSON object: {success: boolean}",
          messages: [{ role: "user", content: `Add these rows to sheet ${SHEET_ID}: ${JSON.stringify(payload)}` }],
          mcp_servers: [{ type: "url", url: "https://mcp.smartsheet.com", name: "smartsheet" }]
        })
      });

      const data = await resp.json();
      const text = (data.content || []).map(b => b.text || "").join("");
      const ok = text.includes("success") || text.includes("SUCCESS");

      if (ok) {
        showStatus(true, `✅ ${rows.length} row${rows.length !== 1 ? "s" : ""} added to Payroll Master Calendar!`);
        rows = [];
        renderPreview();
      } else {
        throw new Error("Unexpected response from API");
      }
    } catch (e) {
      showStatus(false, "❌ Error: " + e.message);
      btnPush.disabled = false;
      btnPush.textContent = "🚀 Push " + rows.length + " Row" + (rows.length !== 1 ? "s" : "") + " to Smartsheet";
    }
  }

  function showStatus(ok, msg) {
    const box = document.getElementById("statusBox");
    if (ok === null) { box.style.display = "none"; return; }
    box.style.display = "block";
    box.className = "status " + (ok ? "ok" : "err");
    box.innerHTML = `<div class="status-msg">${msg}</div>` +
      (ok ? `<a href="${SHEET_URL}" target="_blank" rel="noopener">→ View in Smartsheet ↗</a>` : "");
  }

  // Disable preview button when fields are empty
  ["taskName","startDate"].forEach(id => {
    document.getElementById(id).addEventListener("input", () => {
      const t = document.getElementById("taskName").value.trim();
      const d = document.getElementById("startDate").value;
      document.getElementById("btnPreview").disabled = !(t && d);
    });
  });
  document.getElementById("btnPreview").disabled = true;
</script>
</body>
</html>
